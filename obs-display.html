<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body {
            background: transparent;
            margin: 0;
            overflow: hidden;
        }

        #display {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .media-container {
            position: absolute;
            bottom: 50px;
            right: 50px;
            text-align: center;
            animation: fadeInOut 8.5s forwards;
        }

        img, video {
            max-width: 450px;
            border-radius: 15px;
            border: 4px solid #ff0000;
            box-shadow: 0 0 30px rgba(255,0,0,0.6);
            display: block;
        }

        .name-label {
            color: white;
            font-family: 'Impact', sans-serif;
            font-size: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px #ff0000, 2px 2px 5px #000;
            margin-top: 15px;
        }

        @keyframes fadeInOut {
            0% {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }

            8% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }

            92% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }

            100% {
                opacity: 0;
                transform: scale(0.9) translateY(-20px);
            }
        }
    </style>
</head>
<body>
    <div id="display"></div>

    <script>
        const firebaseConfig = {
        apiKey: "AIzaSyC4fo69Q0sf7DVgJSDhojAPzLsQ7SDu6cg",
        authDomain: "chaostitan41-website.firebaseapp.com",
        databaseURL: "https://chaostitan41-website-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "chaostitan41-website",
        storageBucket: "chaostitan41-website.firebasestorage.app",
        messagingSenderId: "553158677453",
        appId: "1:553158677453:web:2cad39890ffdedb98aaa84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const start = Date.now();
        const notificationSound = new Audio('pop.mp3');

        async function urlExists(url) {
        try {
        const res = await fetch(url, { method: 'HEAD' });
        return res.ok;
        } catch {
        return false;
        }
        }

        // --- GIFs ---
        db.ref('activeGifs').limitToLast(1).on('child_added', async (snap) => {
        const data = snap.val();
        if (data.timestamp < start) return;
        if (!data.gifId || data.gifId.length < 3 || data.gifId === 'clips') return;

        notificationSound.currentTime = 0;
        notificationSound.volume = 0.6;
        notificationSound.play().catch(() => {});

        const box = document.getElementById('display');
        const div = document.createElement('div');
        div.className = "media-container";

        const mp4Url = `https://media.giphy.com/media/${data.gifId}/giphy.mp4`;
        const gifUrl = `https://media.giphy.com/media/${data.gifId}/giphy.gif`;

        const hasMp4 = await urlExists(mp4Url);

        if (hasMp4) {
        div.innerHTML = `
        <video autoplay loop playsinline muted style="width:450px;">
        <source src="${mp4Url}" type="video/mp4">
        </video>
        <div class="name-label">${data.userName}</div>
        `;
        const video = div.querySelector('video');
        video.addEventListener('canplay', () => {
        video.muted = false;
        video.volume = 0.7;
        video.play().catch(() => { video.muted = true; video.play(); });
        });
        } else {
        div.innerHTML = `
        <img src="${gifUrl}" style="width:450px;">
        <div class="name-label">${data.userName}</div>
        `;
        }

        box.appendChild(div);
        setTimeout(() => div.remove(), 8500);
        });

        // --- Vlipsy-Clips ---
        db.ref('activeVlipsy').limitToLast(1).on('child_added', async (snap) => {
        const data = snap.val();
        if (data.timestamp < start) return;

        let videoUrl = null;
        if (data.embedUrl) {
        const clipId = data.embedUrl.match(/embed\/([a-zA-Z0-9]+)/)?.[1];
        if (clipId) {
        try {
        const proxyRes = await fetch(`/api/vlipsy/${clipId}`);
        const proxyData = await proxyRes.json();
        if (proxyData.success && proxyData.videoUrl && !proxyData.fallback) {
        videoUrl = proxyData.videoUrl;
        }
        } catch (e) {
        console.warn('Proxy-Fehler:', e);
        }
        }
        }

        if (!videoUrl) {
        console.warn('Vlipsy: Kein Video gefunden, wird übersprungen.');
        return;
        }

        notificationSound.currentTime = 0;
        notificationSound.volume = 0.4;
        notificationSound.play().catch(() => {});

        const box = document.getElementById('display');
        const div = document.createElement('div');
        div.className = "media-container";
        div.innerHTML = `
        <video autoplay loop playsinline muted style="width:450px;">
        <source src="${videoUrl}" type="video/mp4">
        </video>
        <div class="name-label">${data.clipName || "Vlipsy Clip"}</div>
        `;
        box.appendChild(div);

        const video = div.querySelector('video');
        video.addEventListener('canplay', () => {
        video.muted = false;
        video.volume = 0.7;
        video.play().catch(() => { video.muted = true; video.play(); });
        });

        setTimeout(() => div.remove(), 8500);
        });
    </script>
</body>
</html>
