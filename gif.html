<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>CHAOSTITAN41 - GIF & MEME Anzeige</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body {
            background: transparent;
            margin: 0;
            overflow: hidden;
        }
        #display {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        #audio-unlocker {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 10000;
        }
        .media-container {
            position: absolute;
            bottom: 50px;
            right: 50px;
            text-align: center;
            animation: fadeInOut 8.5s forwards;
        }
        img, video {
            max-width: 450px;
            border-radius: 15px;
            border: 4px solid #ff0000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
            display: block;
        }
        .name-label {
            color: white;
            font-family: 'Impact', sans-serif;
            font-size: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px #ff0000, 2px 2px 5px #000;
            margin-top: 15px;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: scale(0.9) translateY(20px); }
            8% { opacity: 1; transform: scale(1) translateY(0); }
            92% { opacity: 1; transform: scale(1) translateY(0); }
            100% { opacity: 0; transform: scale(0.9) translateY(-20px); }
        }
    </style>
</head>
<body>
    <button id="audio-unlocker" onclick="activateAudio()"></button>
    <div id="display"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC4fo69Q0sf7DVgJSDhojAPzLsQ7SDu6cg",
            authDomain: "chaostitan41-website.firebaseapp.com",
            databaseURL: "https://chaostitan41-website-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "chaostitan41-website",
            storageBucket: "chaostitan41-website.firebasestorage.app",
            messagingSenderId: "553158677453",
            appId: "1:553158677453:web:2cad39890ffdedb98aaa84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const start = Date.now();
        const notificationSound = new Audio('pop.mp3');

        let audioAllowed = false;

        function activateAudio() {
            if (audioAllowed) return;
            audioAllowed = true;

            // Alle bereits existierenden Videos auf Laut stellen
            document.querySelectorAll('video').forEach(video => {
                video.muted = false;
                video.play().catch(e => console.log("play failed", e));
            });

            // Kurzer Sound, um den Audio-Kontext zu aktivieren
            notificationSound.play().then(() => {
                notificationSound.pause();
                notificationSound.currentTime = 0;
            }).catch(e => console.log("sound play", e));

            // Unsichtbaren Button entfernen
            document.getElementById('audio-unlocker').style.display = 'none';
        }

        // Auf neue Einträge in Firebase lauschen
        db.ref('activeGifs').limitToLast(1).on('child_added', (snap) => {
            const data = snap.val();
            if (data.timestamp < start) return;

            // Pop-Sound abspielen
            notificationSound.currentTime = 0;
            notificationSound.volume = 0.6;
            notificationSound.play().catch(() => {});

            const box = document.getElementById('display');
            const div = document.createElement('div');
            div.className = "media-container";

            if (data.type === "vlipsy") {
                // Vlipsy: Direktes Video-Tag mit MP4-URL (funktioniert zuverlässiger als iframe)
                const videoUrl = `https://vlipsy.com/videos/${data.gifId}.mp4`;
                const video = document.createElement('video');
                video.src = videoUrl;
                video.autoplay = true;
                video.loop = false;          // Nur einmal abspielen
                video.playsInline = true;
                video.style.width = "450px";
                video.muted = !audioAllowed;  // Stumm, wenn noch nicht geklickt

                if (audioAllowed) {
                    video.muted = false;
                    video.volume = 0.7;
                }

                // Falls MP4 nicht verfügbar, Fallback auf Poster-Bild
                video.onerror = () => {
                    const img = document.createElement('img');
                    img.src = `https://vlipsy.com/embed/${data.gifId}/poster.jpg`;
                    img.style.width = "450px";
                    div.innerHTML = '';
                    div.appendChild(img);
                    const nameDiv = document.createElement('div');
                    nameDiv.className = "name-label";
                    nameDiv.innerText = data.userName;
                    div.appendChild(nameDiv);
                };

                div.appendChild(video);
                const nameDiv = document.createElement('div');
                nameDiv.className = "name-label";
                nameDiv.innerText = data.userName;
                div.appendChild(nameDiv);
            } else {
                // GIPHY: Standard mit Video + Fallback auf GIF
                const videoUrl = `https://media.giphy.com/media/${data.gifId}/giphy.mp4`;
                const imageUrl = `https://media.giphy.com/media/${data.gifId}/giphy.gif`;
                const video = document.createElement('video');
                video.id = `v-${snap.key}`;
                video.src = videoUrl;
                video.autoplay = true;
                video.loop = true;
                video.playsInline = true;
                video.style.width = "450px";
                video.muted = !audioAllowed;
                if (audioAllowed) video.volume = 0.7;

                video.onerror = () => {
                    video.style.display = 'none';
                    const img = document.getElementById(`i-${snap.key}`);
                    if (img) img.style.display = 'block';
                };
                const img = document.createElement('img');
                img.id = `i-${snap.key}`;
                img.src = imageUrl;
                img.style.display = 'none';
                img.style.width = "450px";

                div.appendChild(video);
                div.appendChild(img);
                const nameDiv = document.createElement('div');
                nameDiv.className = "name-label";
                nameDiv.innerText = data.userName;
                div.appendChild(nameDiv);
            }

            box.appendChild(div);
            // Nach 8,5 Sekunden wieder ausblenden
            setTimeout(() => div.remove(), 8500);
        });
    </script>
</body>
</html>
