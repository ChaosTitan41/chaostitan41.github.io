<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>CHAOSTITAN41 - GIF & MEME Anzeige</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: transparent; margin: 0; overflow: hidden; }
        #display { position: relative; width: 100vw; height: 100vh; }
        #audio-unlocker { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: transparent; border: none; cursor: pointer; z-index: 10000; }
        .media-container { position: absolute; bottom: 50px; right: 50px; text-align: center; animation: fadeInOut 8.5s forwards; }
        img, video, iframe { max-width: 450px; border-radius: 15px; border: 4px solid #ff0000; box-shadow: 0 0 30px rgba(255, 0, 0, 0.6); display: block; }
        iframe { width: 450px; height: 253px; background: #000; }
        .name-label { color: white; font-family: 'Impact', sans-serif; font-size: 50px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 15px #ff0000, 2px 2px 5px #000; margin-top: 15px; }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: scale(0.9) translateY(20px); }
            8% { opacity: 1; transform: scale(1) translateY(0); }
            92% { opacity: 1; transform: scale(1) translateY(0); }
            100% { opacity: 0; transform: scale(0.9) translateY(-20px); }
        }
    </style>
</head>
<body>
    <button id="audio-unlocker" onclick="activateAudio()"></button>
    <div id="display"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC4fo69Q0sf7DVgJSDhojAPzLsQ7SDu6cg",
            authDomain: "chaostitan41-website.firebaseapp.com",
            databaseURL: "https://chaostitan41-website-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "chaostitan41-website",
            storageBucket: "chaostitan41-website.firebasestorage.app",
            messagingSenderId: "553158677453",
            appId: "1:553158677453:web:2cad39890ffdedb98aaa84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const start = Date.now();
        const notificationSound = new Audio('pop.mp3');

        let audioAllowed = false;

        function activateAudio() {
            if (audioAllowed) return;
            audioAllowed = true;
            document.querySelectorAll('video').forEach(v => { v.muted = false; v.play().catch(e => {}); });
            document.querySelectorAll('iframe').forEach(iframe => {
                // Iframe neu laden, damit Autoplay mit Ton funktioniert
                const src = iframe.src;
                iframe.src = '';
                iframe.src = src;
            });
            notificationSound.play().then(() => {
                notificationSound.pause();
                notificationSound.currentTime = 0;
            }).catch(e => console.log("sound play", e));
            document.getElementById('audio-unlocker').style.display = 'none';
        }

        // Vlipsy mit Fallback: erst Embed, bei Fehler direkt die Clip-Seite
        function createVlipsyElement(gifId, userName) {
            const container = document.createElement('div');
            container.style.position = 'relative';
            
            // Versuche zuerst das offizielle Embed
            const embedIframe = document.createElement('iframe');
            embedIframe.src = `https://vlipsy.com/embed/${gifId}?autoplay=1&controls=0&loop=0`;
            embedIframe.width = "450";
            embedIframe.height = "253";
            embedIframe.frameBorder = "0";
            embedIframe.allow = "autoplay; fullscreen";
            embedIframe.style.pointerEvents = "none";
            container.appendChild(embedIframe);

            // Fallback: Falls Embed nicht lädt, ersetze durch Direkt-Link zur Clip-Seite
            let fallbackUsed = false;
            const fallbackTimer = setTimeout(() => {
                if (!fallbackUsed && embedIframe.contentWindow === null) {
                    fallbackUsed = true;
                    const directIframe = document.createElement('iframe');
                    directIframe.src = `https://vlipsy.com/clips/${gifId}?autoplay=1`;
                    directIframe.width = "450";
                    directIframe.height = "253";
                    directIframe.frameBorder = "0";
                    directIframe.allow = "autoplay; fullscreen";
                    directIframe.style.pointerEvents = "none";
                    container.innerHTML = '';
                    container.appendChild(directIframe);
                }
            }, 4000); // 4 Sekunden warten, ob Embed lädt

            // Wenn Embed erfolgreich geladen wird, Timer abbrechen
            embedIframe.onload = () => {
                clearTimeout(fallbackTimer);
            };
            // Fehlerfall: sofort Fallback
            embedIframe.onerror = () => {
                clearTimeout(fallbackTimer);
                if (!fallbackUsed) {
                    fallbackUsed = true;
                    const directIframe = document.createElement('iframe');
                    directIframe.src = `https://vlipsy.com/clips/${gifId}?autoplay=1`;
                    directIframe.width = "450";
                    directIframe.height = "253";
                    directIframe.frameBorder = "0";
                    directIframe.allow = "autoplay; fullscreen";
                    directIframe.style.pointerEvents = "none";
                    container.innerHTML = '';
                    container.appendChild(directIframe);
                }
            };
            
            return container;
        }

        db.ref('activeGifs').limitToLast(1).on('child_added', (snap) => {
            const data = snap.val();
            if (data.timestamp < start) return;

            notificationSound.currentTime = 0;
            notificationSound.volume = 0.6;
            notificationSound.play().catch(() => {});

            const box = document.getElementById('display');
            const div = document.createElement('div');
            div.className = "media-container";

            if (data.type === "vlipsy") {
                const mediaWrapper = createVlipsyElement(data.gifId, data.userName);
                div.appendChild(mediaWrapper);
                const nameDiv = document.createElement('div');
                nameDiv.className = "name-label";
                nameDiv.innerText = data.userName;
                div.appendChild(nameDiv);
            } else {
                // GIPHY: wie gehabt mit Video + Fallback
                const videoUrl = `https://media.giphy.com/media/${data.gifId}/giphy.mp4`;
                const imageUrl = `https://media.giphy.com/media/${data.gifId}/giphy.gif`;
                const video = document.createElement('video');
                video.id = `v-${snap.key}`;
                video.src = videoUrl;
                video.autoplay = true;
                video.loop = true;
                video.playsInline = true;
                video.style.width = "450px";
                video.muted = !audioAllowed;
                if (audioAllowed) video.volume = 0.7;

                video.onerror = () => {
                    video.style.display = 'none';
                    const img = document.getElementById(`i-${snap.key}`);
                    if (img) img.style.display = 'block';
                };
                const img = document.createElement('img');
                img.id = `i-${snap.key}`;
                img.src = imageUrl;
                img.style.display = 'none';
                img.style.width = "450px";

                div.appendChild(video);
                div.appendChild(img);
                const nameDiv = document.createElement('div');
                nameDiv.className = "name-label";
                nameDiv.innerText = data.userName;
                div.appendChild(nameDiv);
            }

            box.appendChild(div);
            setTimeout(() => div.remove(), 8500);
        });
    </script>
</body>
</html>
