<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF & Meme Gönder | CHAOSTITAN41</title>
    <link rel="icon" type="image/ico" href="image/favicon.ico">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body {
            background: #000 url('bg.png') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            font-family: 'Impact', sans-serif;
            text-align: center;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            border: 1px solid #ff0000;
            backdrop-filter: blur(10px);
        }

        input {
            padding: 15px;
            width: 90%;
            border-radius: 8px;
            border: 1px solid #444;
            background: #000;
            color: #fff;
            margin-bottom: 15px;
            font-size: 1.1rem;
            text-align: center;
            font-family: Arial, sans-serif;
            box-sizing: border-box;
        }

        .giphy-search-btn {
            display: inline-block;
            background: #000;
            color: #fff;
            border: 1px solid #fff;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            margin-bottom: 20px;
            font-family: Arial, sans-serif;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .giphy-search-btn:hover {
            background: #fff;
            color: #000;
        }

        .send-btn {
            background: linear-gradient(180deg, #8B0000 0%, #4a0000 100%);
            color: #fff;
            border: 2px solid #ff0000;
            padding: 20px;
            width: 100%;
            border-radius: 10px;
            font-size: 1.5rem;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Impact';
            transition: 0.3s;
        }

        .send-btn:hover:not(:disabled) {
            background: #ff0000;
            box-shadow: 0 0 20px #ff0000;
        }

        .send-btn:disabled {
            background: #333;
            border-color: #555;
            cursor: not-allowed;
            opacity: 0.5;
        }

        #status {
            margin-top: 20px;
            font-family: Arial;
            font-weight: bold;
            min-height: 24px;
        }

        /* Gemeinsamer Container für die Vorschau */
        #preview-container {
            margin: 15px auto;
            display: none;
            justify-content: center;
        }

        #preview-img {
            max-width: 200px;
            display: none;
            border: 2px solid red;
            border-radius: 10px;
        }

        #preview-frame {
            width: 200px;
            height: 112px;
            display: none;
            border: 2px solid red;
            border-radius: 10px;
            background: #000;
        }

        .logo-link {
            display: inline-block;
            text-decoration: none;
            cursor: pointer;
        }

        .logo-img {
            max-width: 200px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .logo-link:hover .logo-img {
            transform: scale(1.05);
            filter: drop-shadow(0 0 25px #ff0000);
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-link"><img src="logo.png" class="logo-img" alt="CHAOSTITAN41 Logo"></a><br>
        
        <a href="https://giphy.com" target="_blank" class="giphy-search-btn">GIF ARA (GIPHY)</a>
        <a href="https://vlipsy.com" target="_blank" class="giphy-search-btn" style="margin-left:10px;">MEME ARA (VLIPSY)</a>
        
        <input type="text" id="username" placeholder="ADINIZ (Dein Name)">
        <input type="text" id="media-url" placeholder="Giphy oder Vlipsy Link hier einfügen..." oninput="handleInput()">
        
        <div id="preview-container">
            <img id="preview-img" alt="GIF Vorschau">
            <iframe id="preview-frame" allowfullscreen></iframe>
        </div>

        <button onclick="send()" class="send-btn" id="sendBtn" disabled>YAYINA GÖNDER!</button>
        <div id="status"></div>
    </div>

    <script>
        // Firebase Config unverändert
        const firebaseConfig = {
            apiKey: "AIzaSyC4fo69Q0sf7DVgJSDhojAPzLsQ7SDu6cg",
            authDomain: "chaostitan41-website.firebaseapp.com",
            databaseURL: "https://chaostitan41-website-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "chaostitan41-website",
            storageBucket: "chaostitan41-website.firebasestorage.app",
            messagingSenderId: "553158677453",
            appId: "1:553158677453:web:2cad39890ffdedb98aaa84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // UI Elemente
        const statusDiv = document.getElementById('status');
        const sendBtn = document.getElementById('sendBtn');
        const mediaUrlInput = document.getElementById('media-url');
        const previewContainer = document.getElementById('preview-container');
        const previewImg = document.getElementById('preview-img');
        const previewFrame = document.getElementById('preview-frame');

        // Status Variablen
        let isCooldownActive = false;
        let isLinkValid = false;
        let currentMediaType = null; // 'giphy' oder 'vlipsy'
        let currentMediaId = null;
        let timerInterval;

        // Button-Status aktualisieren (Nur wenn Link gültig UND kein Cooldown)
        function updateButtonState() {
            if (isLinkValid && !isCooldownActive) {
                sendBtn.disabled = false;
            } else {
                sendBtn.disabled = true;
            }
        }

        // Sehr tolerante Erkennung für Giphy IDs
        function getGiphyId(url) {
            const match = url.match(/(?:giphy\.com\/(?:gifs|stickers|clips)\/(?:.*-)?|media\.giphy\.com\/media\/(?:v1\.[^\/]+\/)?|giphy\.com\/embed\/)([a-zA-Z0-9]+)/i);
            return match ? match[1] : null;
        }

        // Sehr tolerante Erkennung für Vlipsy IDs (Erkennt /clip/, /clips/ und /embed/)
        function getVlipsyId(url) {
            const match = url.match(/vlipsy\.com\/(?:clip|clips|embed)\/([a-zA-Z0-9_-]+)/i);
            return match ? match[1] : null;
        }

        // Asynchroner Check, ob das Giphy Bild existiert
        async function checkGiphyExists(id) {
            return new Promise(resolve => {
                const img = new Image();
                img.onload = () => resolve(true);
                img.onerror = () => resolve(false);
                img.src = `https://media.giphy.com/media/${id}/giphy.gif`;
            });
        }

        // Wird bei jeder Eingabe ins Textfeld aufgerufen
        async function handleInput() {
            const url = mediaUrlInput.value.trim();
            
            // Reset
            isLinkValid = false;
            currentMediaType = null;
            currentMediaId = null;
            previewContainer.style.display = 'none';
            previewImg.style.display = 'none';
            previewFrame.style.display = 'none';
            updateButtonState();

            if (!url) return;

            // 1. Prüfe ob es ein Vlipsy Link ist
            const vlipsyId = getVlipsyId(url);
            if (vlipsyId) {
                currentMediaType = 'vlipsy';
                currentMediaId = vlipsyId;
                isLinkValid = true;
                
                // Vorschau anzeigen
                previewFrame.src = `https://vlipsy.com/embed/${vlipsyId}`;
                previewFrame.style.display = 'block';
                previewContainer.style.display = 'flex';
                
                updateButtonState();
                return;
            }

            // 2. Prüfe ob es ein Giphy Link ist
            const giphyId = getGiphyId(url);
            if (giphyId) {
                const exists = await checkGiphyExists(giphyId);
                if (exists) {
                    currentMediaType = 'giphy';
                    currentMediaId = giphyId;
                    isLinkValid = true;
                    
                    // Vorschau anzeigen
                    previewImg.src = `https://media.giphy.com/media/${giphyId}/giphy.gif`;
                    previewImg.style.display = 'block';
                    previewContainer.style.display = 'flex';
                }
                updateButtonState();
                return;
            }
        }

        // Cooldown Check (Reduziert auf 30 Sekunden)
        function checkCooldown() {
            db.ref('lastMediaTime').once('value', snap => {
                const lastTime = snap.val() || 0;
                const diff = (Date.now() - lastTime) / 1000;
                clearInterval(timerInterval);

                if (diff < 30) {
                    isCooldownActive = true;
                    updateButtonState();
                    
                    let timeLeft = Math.ceil(30 - diff);
                    timerInterval = setInterval(() => {
                        timeLeft--;
                        if (timeLeft <= 0) {
                            clearInterval(timerInterval);
                            isCooldownActive = false;
                            statusDiv.innerHTML = "";
                            updateButtonState();
                        } else {
                            statusDiv.innerHTML = `<span style="color:#ffaa00">COOLDOWN: ${timeLeft}s bekleyin...</span>`;
                        }
                    }, 1000);
                } else {
                    isCooldownActive = false;
                    updateButtonState();
                }
            });
        }
        checkCooldown();

        // User IP abrufen (für Bann-System)
        async function getUserIP() {
            try {
                const res = await fetch('https://api64.ipify.org?format=json');
                const data = await res.json();
                return data.ip.replace(/\./g, '_');
            } catch(e) { return "unknown"; }
        }

        // Senden an Firebase
        async function send() {
            if (!isLinkValid || !currentMediaType || !currentMediaId) return;

            const username = document.getElementById('username').value.trim() || "Anonim";
            let mediaData = null;
            let targetPath = "";

            if (currentMediaType === 'giphy') {
                mediaData = { gifId: currentMediaId, userName: username };
                targetPath = 'activeGifs';
            } else if (currentMediaType === 'vlipsy') {
                mediaData = {
                    embedUrl: `https://vlipsy.com/embed/${currentMediaId}`,
                    clipName: username + " - Vlipsy",
                    userName: username
                };
                targetPath = 'activeVlipsy';
            }

            const userIP = await getUserIP();
            
            db.ref('bannedIPs/' + userIP).once('value', snap => {
                if (snap.exists()) {
                    statusDiv.innerHTML = "<span style='color:red'>BANLISINIZ!</span>";
                    db.ref('bannedRequests').push({ userName: username, userIP: userIP, timestamp: firebase.database.ServerValue.TIMESTAMP });
                    return;
                }
                
                const now = Date.now();
                db.ref('lastMediaTime').set(now); // Setzt Cooldown für alle
                
                const entry = { ...mediaData, userIP: userIP, timestamp: now };
                
                db.ref(targetPath).push(entry).then(() => {
                    statusDiv.innerHTML = "<span style='color:#00ff99'>✅ GÖNDERİLDİ!</span>";
                    
                    // Reset Felder nach erfolgreichem Senden
                    mediaUrlInput.value = "";
                    handleInput(); // Versteckt Vorschau und deaktiviert Button
                    
                    const day = new Date().toISOString().split('T')[0];
                    db.ref('stats/daily/' + day + '/' + userIP).set(true);
                });
            });
        }

        // Listener für Cooldown-Updates aus der Datenbank
        db.ref('lastMediaTime').on('value', () => checkCooldown());
    </script>
</body>
</html>
