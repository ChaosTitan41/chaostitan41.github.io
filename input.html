<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF Gönder | CHAOSTITAN41</title>
    <link rel="icon" type="image/ico" href="image/favicon.ico">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #000 url('bg.png') no-repeat center center fixed; background-size: cover; color: #fff; font-family: 'Impact', sans-serif; text-align: center; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { width: 100%; max-width: 600px; padding: 40px 20px; background: rgba(0, 0, 0, 0.8); border-radius: 20px; border: 1px solid #ff0000; backdrop-filter: blur(10px); }
        input { padding: 15px; width: 90%; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; margin-bottom: 15px; font-size: 1.1rem; text-align: center; }
        .send-btn { background: linear-gradient(180deg, #8B0000 0%, #4a0000 100%); color: #fff; border: 2px solid #ff0000; padding: 20px; width: 100%; border-radius: 10px; font-size: 1.5rem; cursor: pointer; text-transform: uppercase; font-family: 'Impact'; transition: 0.3s; }
        .send-btn:hover { background: #ff0000; box-shadow: 0 0 20px #ff0000; }
        .send-btn:disabled { background: #333; border-color: #555; cursor: not-allowed; }
        #status { margin-top: 20px; font-family: Arial; font-weight: bold; min-height: 24px; }
        #gif-preview { max-width: 200px; display: none; margin: 15px auto; border: 2px solid red; border-radius: 10px; }
        .logo-img { max-width: 200px; margin-bottom: 10px; transition: 0.3s; }
        .logo-link:hover .logo-img { transform: scale(1.05); filter: drop-shadow(0 0 25px #ff0000); }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-link"><img src="logo.png" class="logo-img" alt="Logo"></a><br>
        <input type="text" id="username" placeholder="ADINIZ">
        <input type="text" id="gif-url" placeholder="Giphy veya Vlipsy Linkini Yapıştır..." oninput="updatePreview()">
        <img id="gif-preview" alt="Vorschau">
        <button onclick="send()" class="send-btn">YAYINA GÖNDER!</button>
        <div id="status"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC4fo69Q0sf7DVgJSDhojAPzLsQ7SDu6cg",
            authDomain: "chaostitan41-website.firebaseapp.com",
            databaseURL: "https://chaostitan41-website-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "chaostitan41-website",
            storageBucket: "chaostitan41-website.firebasestorage.app",
            messagingSenderId: "553158677453",
            appId: "1:553158677453:web:2cad39890ffdedb98aaa84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const statusDiv = document.getElementById('status');
        const sendBtn = document.querySelector('.send-btn');

        function getID(url) {
            try {
                if (!url) return null;
                if (url.includes("vlipsy.com")) {
                    const id = url.split("/").pop().split("?")[0];
                    return { id: id, type: "vlipsy" };
                }
                if (url.includes("giphy.com")) {
                    const parts = url.split("/");
                    let id = url.includes("/gifs/") ? url.split("-").pop().split("/")[0] : parts[parts.length - 2];
                    return { id: id.split("?")[0], type: "giphy" };
                }
                return null;
            } catch(e) { return null; }
        }

        function updatePreview() {
            const res = getID(document.getElementById('gif-url').value);
            const img = document.getElementById('gif-preview');
            if(res && res.type === "giphy") {
                img.src = `https://media.giphy.com/media/${res.id}/giphy.gif`;
                img.style.display = "block";
            } else { img.style.display = "none"; }
        }

        async function send() {
            const res = getID(document.getElementById('gif-url').value);
            const name = document.getElementById('username').value || "Anonim";
            if(!res) return alert("Hata: Sadece Giphy veya Vlipsy Linki!");

            let userIP = "unknown";
            try {
                const r = await fetch('https://api64.ipify.org?format=json');
                const d = await r.json();
                userIP = d.ip.replace(/\./g, '_');
            } catch(e) {}

            db.ref('activeGifs').push({
                gifId: res.id,
                type: res.type,
                userName: name,
                userIP: userIP,
                timestamp: Date.now()
            }).then(() => {
                statusDiv.innerHTML = "<span style='color:#00ff99'>✅ GÖNDERİLDİ!</span>";
                document.getElementById('gif-url').value = "";
                document.getElementById('gif-preview').style.display = "none";
            });
        }
    </script>
</body>
</html>
