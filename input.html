<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF & Meme Gönder | CHAOSTITAN41</title>
    <link rel="icon" type="image/ico" href="image/favicon.ico">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        body {
            background: #000 url('bg.png') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            font-family: 'Impact', sans-serif;
            text-align: center;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            border: 1px solid #ff0000;
            backdrop-filter: blur(10px);
        }

        input {
            padding: 15px;
            width: 90%;
            border-radius: 8px;
            border: 1px solid #444;
            background: #000;
            color: #fff;
            margin-bottom: 15px;
            font-size: 1.1rem;
            text-align: center;
            font-family: Arial, sans-serif;
        }

        .giphy-search-btn {
            display: inline-block;
            background: #000;
            color: #fff;
            border: 1px solid #fff;
            padding: 10px 18px;
            border-radius: 5px;
            text-decoration: none;
            margin-bottom: 20px;
            font-family: Arial, sans-serif;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .giphy-search-btn + .giphy-search-btn {
            margin-left: 6px;
        }

        .giphy-search-btn:hover {
            background: #fff;
            color: #000;
        }

        .send-btn {
            background: linear-gradient(180deg, #8B0000 0%, #4a0000 100%);
            color: #fff;
            border: 2px solid #ff0000;
            padding: 20px;
            width: 100%;
            border-radius: 10px;
            font-size: 1.5rem;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Impact';
            transition: 0.3s;
        }

        .send-btn:hover:not(:disabled) {
            background: #ff0000;
            box-shadow: 0 0 20px #ff0000;
        }

        .send-btn:disabled {
            background: #333;
            border-color: #555;
            cursor: not-allowed;
            opacity: 0.5;
        }

        #status {
            margin-top: 20px;
            font-family: Arial;
            font-weight: bold;
            min-height: 24px;
        }

        #preview {
            max-width: 200px;
            display: none;
            margin: 15px auto;
            border: 2px solid red;
            border-radius: 10px;
        }

        .logo-link {
            display: inline-block;
            text-decoration: none;
        }

        .logo-img {
            max-width: 200px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .logo-link:hover .logo-img {
            transform: scale(1.05);
            filter: drop-shadow(0 0 25px #ff0000);
        }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="logo-link">
        <img src="logo.png" class="logo-img" alt="CHAOSTITAN41 Logo">
    </a><br>

    <a href="https://giphy.com" target="_blank" class="giphy-search-btn">GIF ARA (GIPHY)</a>
    <a href="https://vlipsy.com" target="_blank" class="giphy-search-btn">MEME ARA (VLIPSY)</a>
    <a href="https://www.myinstants.com" target="_blank" class="giphy-search-btn">SOUND (MYINSTANTS)</a>

    <input type="text" id="username" placeholder="ADINIZ">
    <input type="text" id="media-url" placeholder="Giphy, Vlipsy oder MyInstants Link einfügen..." oninput="validateInput()">

    <img id="preview" alt="Vorschau">

    <button id="sendBtn" class="send-btn" onclick="send()" disabled>YAYINA GÖNDER!</button>
    <div id="status"></div>
</div>

<script>
/* ========== Firebase ========== */
const firebaseConfig = {
    apiKey: "AIzaSyC4fo69Q0sf7DVgJSDhojAPzLsQ7SDu6cg",
    authDomain: "chaostitan41-website.firebaseapp.com",
    databaseURL: "https://chaostitan41-website-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "chaostitan41-website",
    storageBucket: "chaostitan41-website.firebasestorage.app",
    messagingSenderId: "553158677453",
    appId: "1:553158677453:web:2cad39890ffdedb98aaa84"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ========== DOM ========== */
const sendBtn   = document.getElementById('sendBtn');
const statusDiv = document.getElementById('status');
const preview   = document.getElementById('preview');

let isCooldownActive = false;
let timerInterval = null;

/* aktuell erkannter Typ: "giphy" | "vlipsy" | "myinstants" | null */
let currentType = null;
let currentGiphyId = null;
let currentVlipsyId = null;
let currentMyInstantsUrl = null;

/* ========== Helper: ID-Erkennung ========== */

function getGiphyId(url) {
    try {
        const patterns = [
            /giphy\.com\/gifs\/(?:[^\/]+-)?([a-zA-Z0-9]+)/,
            /giphy\.com\/embed\/([a-zA-Z0-9]+)/,
            /media\.giphy\.com\/media\/([a-zA-Z0-9]+)\//,
            /giphy\.com\/clips\/(?:[^\/]+-)?([a-zA-Z0-9]+)/
        ];
        for (const p of patterns) {
            const m = url.match(p);
            if (m && m[1]) return m[1];
        }
        const parts = url.split("/");
        let last = parts[parts.length - 1];
        if (last.includes("?")) last = last.split("?")[0];
        if (last === "giphy.gif") last = parts[parts.length - 2];
        if (/^[a-zA-Z0-9]+$/.test(last)) return last;
        return null;
    } catch {
        return null;
    }
}

function getVlipsyId(url) {
    try {
        const patterns = [
            /vlipsy\.com\/clip\/([a-zA-Z0-9]+)/,
            /vlipsy\.com\/clips\/([a-zA-Z0-9]+)/,
            /vlipsy\.com\/embed\/([a-zA-Z0-9]+)/
        ];
        for (const p of patterns) {
            const m = url.match(p);
            if (m && m[1]) return m[1];
        }
        return null;
    } catch {
        return null;
    }
}

function isMyInstantsUrl(url) {
    try {
        const clean = url.split("?")[0];
        return /myinstants\.com\/(instant\/|[a-z]{2}\/instant\/)/.test(clean);
    } catch {
        return false;
    }
}

/* ========== Giphy-Check für Vorschau ========== */
async function checkGiphyExists(id) {
    if (!id) return false;
    const testUrl = `https://media.giphy.com/media/${id}/giphy.gif`;
    return new Promise(resolve => {
        const img = new Image();
        img.onload  = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src     = testUrl;
    });
}

/* ========== Cooldown handling ========== */
function checkCooldown() {
    db.ref('lastMediaTime').once('value', snap => {
        const lastTime = snap.val() || 0;
        const diff = (Date.now() - lastTime) / 1000;
        clearInterval(timerInterval);

        if (diff < 30) {
            isCooldownActive = true;
            let timeLeft = Math.ceil(30 - diff);
            sendBtn.disabled = true;

            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    isCooldownActive = false;
                    statusDiv.innerHTML = "";
                    validateInput(); // Button ggf. wieder aktivieren
                } else {
                    statusDiv.innerHTML = `<span style="color:#ffaa00">COOLDOWN: ${timeLeft}s bekleyin...</span>`;
                }
            }, 1000);
        } else {
            isCooldownActive = false;
            validateInput();
        }
    });
}

/* ========== IP holen ========== */
async function getUserIP() {
    try {
        const res = await fetch('https://api64.ipify.org?format=json');
        const data = await res.json();
        return data.ip.replace(/\./g, '_');
    } catch {
        return "unknown";
    }
}

/* ========== Eingabe validieren ========== */
async function validateInput() {
    const url = document.getElementById('media-url').value.trim();

    currentType = null;
    currentGiphyId = null;
    currentVlipsyId = null;
    currentMyInstantsUrl = null;
    preview.style.display = 'none';
    sendBtn.disabled = true;

    if (!url) return;

    // Giphy
    const gId = getGiphyId(url);
    if (gId && await checkGiphyExists(gId)) {
        currentType = "giphy";
        currentGiphyId = gId;
        preview.src = `https://media.giphy.com/media/${gId}/giphy.gif`;
        preview.style.display = 'block';
        if (!isCooldownActive) sendBtn.disabled = false;
        return;
    }

    // Vlipsy
    const vId = getVlipsyId(url);
    if (vId) {
        currentType = "vlipsy";
        currentVlipsyId = vId;
        preview.src = 'https://via.placeholder.com/200x112/000000/FFFFFF?text=VLIPSY+CLIP';
        preview.style.display = 'block';
        if (!isCooldownActive) sendBtn.disabled = false;
        return;
    }

    // MyInstants
    if (isMyInstantsUrl(url)) {
        currentType = "myinstants";
        currentMyInstantsUrl = url;
        preview.src = 'https://via.placeholder.com/200x112/000000/FF007F?text=MYINSTANTS+SOUND';
        preview.style.display = 'block';
        if (!isCooldownActive) sendBtn.disabled = false;
        return;
    }
}

/* ========== Senden ========== */
async function send() {
    if (!currentType) return;

    const username = document.getElementById('username').value.trim() || "Anonim";

    let mediaData  = null;
    let targetPath = "";

    if (currentType === "giphy" && currentGiphyId) {
        const exists = await checkGiphyExists(currentGiphyId);
        if (!exists) {
            alert("GIF nicht gefunden!");
            return;
        }
        mediaData = {
            gifId: currentGiphyId,
            userName: username
        };
        targetPath = 'activeGifs';

    } else if (currentType === "vlipsy" && currentVlipsyId) {
        mediaData = {
            clipId: currentVlipsyId,
            userName: username
        };
        targetPath = 'activeVlipsy';

    } else if (currentType === "myinstants" && currentMyInstantsUrl) {
        mediaData = {
            url: currentMyInstantsUrl,
            userName: username
        };
        targetPath = 'activeMyInstants';

    } else {
        return;
    }

    const userIP = await getUserIP();

    db.ref('bannedIPs/' + userIP).once('value', snap => {
        if (snap.exists()) {
            statusDiv.innerHTML = "<span style='color:red'>BANLISINIZ!</span>";
            db.ref('bannedRequests').push({
                userName: username,
                userIP: userIP,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
            return;
        }

        const now = Date.now();
        db.ref('lastMediaTime').set(now);

        const entry = {
            ...mediaData,
            userIP: userIP,
            timestamp: now
        };

        db.ref(targetPath).push(entry).then(() => {
            statusDiv.innerHTML = "<span style='color:#00ff99'>✅ GÖNDERİLDİ!</span>";
            document.getElementById('media-url').value = "";
            preview.style.display = 'none';
            currentType = null;
            currentGiphyId = null;
            currentVlipsyId = null;
            currentMyInstantsUrl = null;
            sendBtn.disabled = true;

            const day = new Date().toISOString().split('T')[0];
            db.ref('stats/daily/' + day + '/' + userIP).set(true);
        });
    });
}

/* Init Cooldown-Listener */
db.ref('lastMediaTime').on('value', () => checkCooldown());
checkCooldown();
</script>
</body>
</html>
