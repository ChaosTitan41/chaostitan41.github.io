<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF & Meme Gönder | CHAOSTITAN41</title>
    <link rel="icon" type="image/ico" href="image/favicon.ico">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body {
            background: #000 url('bg.png') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            font-family: 'Impact', sans-serif;
            text-align: center;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            border: 1px solid #ff0000;
            backdrop-filter: blur(10px);
        }
        input {
            padding: 15px;
            width: 90%;
            border-radius: 8px;
            border: 1px solid #444;
            background: #000;
            color: #fff;
            margin-bottom: 15px;
            font-size: 1.1rem;
            text-align: center;
            font-family: Arial, sans-serif;
        }
        .giphy-search-btn {
            display: inline-block;
            background: #000;
            color: #fff;
            border: 1px solid #fff;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            margin-bottom: 20px;
            font-family: Arial, sans-serif;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .giphy-search-btn:hover {
            background: #fff;
            color: #000;
        }
        .send-btn {
            background: linear-gradient(180deg, #8B0000 0%, #4a0000 100%);
            color: #fff;
            border: 2px solid #ff0000;
            padding: 20px;
            width: 100%;
            border-radius: 10px;
            font-size: 1.5rem;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Impact';
            transition: 0.3s;
        }
        .send-btn:hover:not(:disabled) {
            background: #ff0000;
            box-shadow: 0 0 20px #ff0000;
        }
        .send-btn:disabled {
            background: #333;
            border-color: #555;
            cursor: not-allowed;
            opacity: 0.5;
        }
        #status {
            margin-top: 20px;
            font-family: Arial;
            font-weight: bold;
            min-height: 24px;
        }
        #preview {
            max-width: 200px;
            display: none;
            margin: 15px auto;
            border: 2px solid red;
            border-radius: 10px;
        }
        .logo-img {
            max-width: 200px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html">
        <img src="logo.png" class="logo-img" alt="CHAOSTITAN41 Logo">
    </a><br>
    
    <a href="https://giphy.com" target="_blank" class="giphy-search-btn">GIF ARA (GIPHY)</a>
    <a href="https://vlipsy.com" target="_blank" class="giphy-search-btn" style="margin-left:10px;">MEME ARA (VLIPSY)</a>
    
    <input type="text" id="username" placeholder="ADINIZ">
    <input type="text" id="media-url" placeholder="Giphy oder Vlipsy Link..." oninput="validateInput()">
    
    <img id="preview" alt="Vorschau">
    
    <button onclick="send()" id="submit-btn" class="send-btn" disabled>YAYINA GÖNDER!</button>
    
    <div id="status"></div>
</div>

<script>
// Firebase Config
const firebaseConfig = {
    apiKey: "AIzaSyC4fo69Q0sf7DVgJSDhojAPzLsQ7SDu6cg",
    authDomain: "chaostitan41-website.firebaseapp.com",
    databaseURL: "https://chaostitan41-website-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "chaostitan41-website",
    storageBucket: "chaostitan41-website.firebasestorage.app",
    messagingSenderId: "553158677453",
    appId: "1:553158677453:web:2cad39890ffdedb98aaa84"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const sendBtn = document.getElementById('submit-btn');
const statusDiv = document.getElementById('status');
const previewImg = document.getElementById('preview');
let timerInterval;

let currentType = null;
let currentGifId = null;
let currentVlipsyId = null;

// Giphy ID Finder
function getGiphyId(url) {
    if (!url.includes("giphy.com")) return null;
    try {
        const patterns = [
            /\/media\/[^\/]+\/([a-zA-Z0-9]+)\/giphy/,
            /giphy\.com\/gifs\/(?:[^\/]+\-)?([a-zA-Z0-9]+)/,
            /giphy\.com\/embed\/([a-zA-Z0-9]+)/,
            /giphy\.com\/clips\/([a-zA-Z0-9]+)/
        ];
        for (const p of patterns) {
            const m = url.match(p);
            if (m && m[1]) return m[1];
        }
        return null;
    } catch(e) { return null; }
}

// Vlipsy ID Finder
function getVlipsyId(url) {
    if (!url.includes("vlipsy.com")) return null;
    try {
        const patterns = [
            /vlipsy\.com\/clip\/([a-zA-Z0-9]+)/,
            /vlipsy\.com\/v\/([a-zA-Z0-9]+)/,
            /vlipsy\.com\/embed\/([a-zA-Z0-9]+)/
        ];
        for (const p of patterns) {
            const m = url.match(p);
            if (m && m[1]) return m[1];
        }
        return null;
    } catch(e) { return null; }
}

// Validierung (Wird bei jeder Eingabe aufgerufen)
function validateInput() {
    const url = document.getElementById('media-url').value.trim();
    currentType = null;
    currentGifId = null;
    currentVlipsyId = null;
    previewImg.style.display = 'none';
    
    if (!url) {
        sendBtn.disabled = true;
        return;
    }
    
    // Giphy Check
    const gId = getGiphyId(url);
    if (gId) {
        currentType = "gif";
        currentGifId = gId;
        previewImg.src = `https://media.giphy.com/media/${gId}/giphy.gif`;
        previewImg.style.display = 'block';
        checkCooldown(); // Prüft ob Cooldown läuft, falls nicht -> freischalten
        return;
    }
    
    // Vlipsy Check
    const vId = getVlipsyId(url);
    if (vId) {
        currentType = "vlipsy";
        currentVlipsyId = vId;
        previewImg.src = 'https://via.placeholder.com/200x112/000000/FFFFFF?text=VLIPSY+CLIP';
        previewImg.style.display = 'block';
        checkCooldown();
        return;
    }
    
    sendBtn.disabled = true;
}

// IP abrufen
async function getUserIP() {
    try {
        const res = await fetch('https://api64.ipify.org?format=json');
        const data = await res.json();
        return data.ip; 
    } catch(e) { return "unknown"; }
}

// Senden (Spam-Schutz integriert)
async function send() {
    if (!currentType || sendBtn.disabled) return;

    // SOFORT SPERREN
    sendBtn.disabled = true;
    statusDiv.innerHTML = "Gönderiliyor...";

    const username = document.getElementById('username').value.trim() || "Anonim";
    const userIP = await getUserIP();
    const safeIPKey = userIP.replace(/\./g, '_'); 

    // Ban Check
    const banSnap = await db.ref('bannedIPs/' + safeIPKey).get();
    if (banSnap.exists()) {
        statusDiv.innerHTML = "<span style='color:red'>BANLISINIZ!</span>";
        return;
    }

    let mediaData = {};
    let targetPath = "";

    if (currentType === "gif") {
        mediaData = { gifId: currentGifId, userName: username, userIP: userIP };
        targetPath = 'activeGifs';
    } else {
        mediaData = {
            embedUrl: `https://vlipsy.com/embed/${currentVlipsyId}`,
            clipName: username + " - Vlipsy",
            userName: username,
            userIP: userIP
        };
        targetPath = 'activeVlipsy';
    }

    const entry = { 
        ...mediaData, 
        timestamp: firebase.database.ServerValue.TIMESTAMP
    };

    db.ref(targetPath).push(entry).then(() => {
        db.ref('lastMediaTime').set(Date.now());
        statusDiv.innerHTML = "<span style='color:#00ff99'>✅ GÖNDERİLDİ!</span>";
        document.getElementById('media-url').value = "";
        previewImg.style.display = "none";
        currentType = null;
    }).catch(err => {
        statusDiv.innerHTML = "<span style='color:red'>Hata!</span>";
        sendBtn.disabled = false;
    });
}

// Cooldown Prüfung
function checkCooldown() {
    db.ref('settings/cooldown').once('value', settingsSnap => {
        const dynamicCooldown = settingsSnap.val() || 30;

        db.ref('lastMediaTime').once('value', snap => {
            const lastTime = snap.val() || 0;
            const diff = (Date.now() - lastTime) / 1000;
            clearInterval(timerInterval);
            
            if (diff < dynamicCooldown) {
                let timeLeft = Math.ceil(dynamicCooldown - diff);
                sendBtn.disabled = true;
                timerInterval = setInterval(() => {
                    timeLeft--;
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        statusDiv.innerHTML = "";
                        // Nur freischalten wenn auch ein Typ erkannt wurde
                        if(currentType) sendBtn.disabled = false; 
                    } else {
                        statusDiv.innerHTML = `<span style="color:#ffaa00">COOLDOWN: ${timeLeft}s</span>`;
                    }
                }, 1000);
            } else {
                // Kein Cooldown -> Button freigeben wenn Link gültig
                if (currentType) {
                    sendBtn.disabled = false;
                    statusDiv.innerHTML = "";
                }
            }
        });
    });
}

// Echtzeit-Update für Cooldown
db.ref('lastMediaTime').on('value', () => checkCooldown());
</script>
</body>
</html>
