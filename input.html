<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF & Meme Gönder | CHAOSTITAN41</title>
    <link rel="icon" type="image/ico" href="image/favicon.ico">

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        body {
            background: #000 url('bg.png') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            font-family: 'Impact', sans-serif;
            text-align: center;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            border: 1px solid #ff0000;
            backdrop-filter: blur(10px);
        }

        input {
            padding: 15px;
            width: 90%;
            border-radius: 8px;
            border: 1px solid #444;
            background: #000;
            color: #fff;
            margin-bottom: 15px;
            font-size: 1.1rem;
            text-align: center;
            font-family: Arial, sans-serif;
        }

        .giphy-search-btn {
            display: inline-block;
            background: #000;
            color: #fff;
            border: 1px solid #fff;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            margin-bottom: 20px;
            font-family: Arial, sans-serif;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .giphy-search-btn:hover {
            background: #fff;
            color: #000;
        }

        .send-btn {
            background: linear-gradient(180deg, #8B0000 0%, #4a0000 100%);
            color: #fff;
            border: 2px solid #ff0000;
            padding: 20px;
            width: 100%;
            border-radius: 10px;
            font-size: 1.5rem;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Impact';
            transition: 0.3s;
        }

        .send-btn:hover {
            background: #ff0000;
            box-shadow: 0 0 20px #ff0000;
        }

        .send-btn:disabled {
            background: #333;
            border-color: #555;
            cursor: not-allowed;
        }

        #status {
            margin-top: 20px;
            font-family: Arial;
            font-weight: bold;
            min-height: 24px;
        }

        #preview-container {
            max-width: 300px;
            margin: 15px auto;
            position: relative;
            display: none;
        }

        #preview {
            max-width: 100%;
            border: 2px solid red;
            border-radius: 10px;
        }

        #preview-video {
            max-width: 100%;
            border: 2px solid red;
            border-radius: 10px;
            display: none;
        }

        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 0, 0, 0.8);
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            cursor: pointer;
            display: none;
        }

        .play-button::after {
            content: '▶';
            color: white;
            font-size: 24px;
            margin-left: 4px;
        }

        .logo-link {
            display: inline-block;
        }

        .logo-img {
            max-width: 200px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .logo-link:hover .logo-img {
            transform: scale(1.05);
            filter: drop-shadow(0 0 25px #ff0000);
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="logo-link">
        <img src="logo.png" class="logo-img">
    </a><br>

    <a href="https://giphy.com" target="_blank" class="giphy-search-btn">GIF ARA (GIPHY)</a>
    <a href="https://vlipsy.com" target="_blank" class="giphy-search-btn" style="margin-left:10px;">MEME ARA</a>

    <input type="text" id="username" placeholder="ADINIZ">
    <input type="text" id="media-url" placeholder="GIF oder Vlipsy Link..." oninput="validateInput()">

    <div id="preview-container">
        <img id="preview">
        <video id="preview-video" loop muted></video>
        <button class="play-button" onclick="toggleVideoPlay()"></button>
    </div>

    <button onclick="send()" class="send-btn" disabled>YAYINA GÖNDER!</button>

    <div id="status"></div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyC4fo69Q0sf7DVgJSDhojAPzLsQ7SDu6cg",
    authDomain: "chaostitan41-website.firebaseapp.com",
    databaseURL: "https://chaostitan41-website-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "chaostitan41-website",
    storageBucket: "chaostitan41-website.firebasestorage.app",
    messagingSenderId: "553158677453",
    appId: "1:553158677453:web:2cad39890ffdedb98aaa84"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const sendBtn = document.querySelector('.send-btn');
const statusDiv = document.getElementById('status');
const previewContainer = document.getElementById('preview-container');
const previewImg = document.getElementById('preview');
const previewVideo = document.getElementById('preview-video');
const playButton = document.querySelector('.play-button');

let currentMediaType = null; // 'gif' oder 'vlipsy'
let timerInterval;

function getGiphyId(url) {
    try {
        const match = url.match(/\/media\/[^\/]+\/([a-zA-Z0-9]+)\/giphy/);
        if (match && match[1]) return match[1];

        const parts = url.split("/");
        let lastPart = parts[parts.length - 1];
        if (lastPart.includes("?")) lastPart = lastPart.split("?")[0];
        if (lastPart === "giphy.gif") lastPart = parts[parts.length - 2];
        if (lastPart.match(/^[a-zA-Z0-9]+$/)) return lastPart;
        return null;
    } catch(e) { return null; }
}

function getVlipsyId(url) {
    const match = url.match(/vlipsy\.com\/clips\/([a-zA-Z0-9]+)/);
    return match ? match[1] : null;
}

async function checkGiphyExists(id) {
    if (!id || id.length < 3) return false;
    const testUrl = `https://media.giphy.com/media/${id}/giphy.gif`;
    return new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src = testUrl;
    });
}

function getVlipsyVideoUrl(clipId) {
    // Vlipsy Video-URL-Struktur: https://vlipsy.com/static/videos/clips_preview/{clipId}.mp4
    return `https://vlipsy.com/static/videos/clips_preview/${clipId}.mp4`;
}

async function validateInput() {
    const url = document.getElementById('media-url').value.trim();
    
    // Reset preview
    previewContainer.style.display = "none";
    previewImg.style.display = "none";
    previewVideo.style.display = "none";
    playButton.style.display = "none";
    currentMediaType = null;

    let valid = false;

    // Prüfe zuerst Giphy
    const gifId = getGiphyId(url);
    if (gifId && await checkGiphyExists(gifId)) {
        previewImg.src = `https://media.giphy.com/media/${gifId}/giphy.gif`;
        previewImg.style.display = "block";
        previewContainer.style.display = "block";
        currentMediaType = 'gif';
        valid = true;
    } else {
        // Prüfe Vlipsy
        const clipId = getVlipsyId(url);
        if (clipId) {
            const videoUrl = getVlipsyVideoUrl(clipId);
            
            // Teste ob Video existiert
            const videoExists = await checkVideoExists(videoUrl);
            if (videoExists) {
                previewVideo.src = videoUrl;
                previewVideo.style.display = "block";
                playButton.style.display = "block";
                previewContainer.style.display = "block";
                currentMediaType = 'vlipsy';
                valid = true;
            }
        }
    }

    sendBtn.disabled = !valid;
    sendBtn.style.opacity = valid ? "1" : "0.5";
}

async function checkVideoExists(url) {
    return new Promise(resolve => {
        const xhr = new XMLHttpRequest();
        xhr.open('HEAD', url);
        xhr.onload = () => resolve(xhr.status === 200);
        xhr.onerror = () => resolve(false);
        xhr.send();
    });
}

function toggleVideoPlay() {
    if (previewVideo.paused) {
        previewVideo.play();
        playButton.style.display = "none";
    } else {
        previewVideo.pause();
        playButton.style.display = "block";
    }
}

// Video zurücksetzen wenn angeklickt
previewVideo.addEventListener('click', function() {
    this.pause();
    this.currentTime = 0;
    playButton.style.display = "block";
});

function checkCooldown() {
    db.ref('lastMediaTime').once('value', snap => {
        const lastTime = snap.val() || 0;
        const diff = (Date.now() - lastTime) / 1000;
        clearInterval(timerInterval);
        
        if (diff < 30) {
            let timeLeft = Math.ceil(30 - diff);
            sendBtn.disabled = true;
            sendBtn.style.opacity = "0.5";
            
            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    if (currentMediaType) {
                        sendBtn.disabled = false;
                        sendBtn.style.opacity = "1";
                    }
                    statusDiv.innerHTML = "";
                } else {
                    statusDiv.innerHTML = `<span style="color:#ffaa00">COOLDOWN: ${timeLeft}s bekleyin...</span>`;
                }
            }, 1000);
        } else {
            if (currentMediaType) {
                sendBtn.disabled = false;
                sendBtn.style.opacity = "1";
            }
        }
    });
}

async function getUserIP() {
    try {
        const res = await fetch('https://api64.ipify.org?format=json');
        const data = await res.json();
        return data.ip.replace(/\./g, '_');
    } catch(e) { return "unknown"; }
}

async function send() {
    const username = document.getElementById('username').value.trim() || "Anonim";
    const url = document.getElementById('media-url').value.trim();

    let mediaData = null;
    let targetPath = "";

    if (currentMediaType === 'gif') {
        const gifId = getGiphyId(url);
        if (!gifId) return;
        
        mediaData = { 
            gifId: gifId, 
            userName: username 
        };
        targetPath = 'activeGifs';
    } else if (currentMediaType === 'vlipsy') {
        const clipId = getVlipsyId(url);
        if (!clipId) return;
        
        mediaData = {
            embedUrl: `https://vlipsy.com/embed/${clipId}`,
            clipName: username + " - Vlipsy",
            userName: username
        };
        targetPath = 'activeVlipsy';
    } else {
        return;
    }

    const userIP = await getUserIP();
    
    // Ban-Check
    db.ref('bannedIPs/' + userIP).once('value', snap => {
        if (snap.exists()) {
            statusDiv.innerHTML = "<span style='color:red'>BANLISINIZ!</span>";
            db.ref('bannedRequests').push({ 
                userName: username, 
                userIP: userIP, 
                timestamp: firebase.database.ServerValue.TIMESTAMP 
            });
            return;
        }

        const now = Date.now();
        db.ref('lastMediaTime').set(now);
        
        const entry = { 
            ...mediaData, 
            userIP: userIP, 
            timestamp: now 
        };
        
        db.ref(targetPath).push(entry).then(() => {
            statusDiv.innerHTML = "<span style='color:#00ff99'>✅ GÖNDERİLDİ!</span>";
            document.getElementById('media-url').value = "";
            previewContainer.style.display = "none";
            
            // Stats tracking
            const day = new Date().toISOString().split('T')[0];
            db.ref('stats/daily/' + day + '/' + userIP).set(true);
            
            // Button zurücksetzen
            sendBtn.disabled = true;
            sendBtn.style.opacity = "0.5";
            currentMediaType = null;
        });
    });
}

// Cooldown überwachen
db.ref('lastMediaTime').on('value', () => checkCooldown());

// Initialer Cooldown-Check
checkCooldown();
</script>

</body>
</html>
