<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>ChaosBOT OBS Overlay</title>
    <style>
        body {
            margin: 0;
            background: transparent;
            overflow: hidden;
        }

        #videoContainer {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        video {
            max-width: 100%;
            max-height: 100%;
        }

        #debug {
            display: none;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

    <div id="debug">Firebase wird initialisiert...</div>

    <div id="videoContainer">
        <video id="overlayVideo" autoplay muted playsinline></video>
    </div>

    <audio id="overlayAudio"></audio>

    <script>
        const debugEl = document.getElementById('debug');
        function log(msg) {
            console.log(msg);
            debugEl.innerHTML += '<br>' + msg;
            // Maximal 20 Zeilen im Debug behalten
            const lines = debugEl.innerHTML.split('<br>');
            if (lines.length > 20) {
                debugEl.innerHTML = lines.slice(-20).join('<br>');
            }
        }

        // ── FIX 1: databaseURL auf .app vereinheitlicht (gleich wie send.html) ──
        const firebaseConfig = {
            apiKey: "AIzaSyC4fo69Q0sf7DVgJSDhojAPzLsQ7SDu6cg",
            authDomain: "chaostitan41-website.firebaseapp.com",
            databaseURL: "https://chaostitan41-website-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "chaostitan41-website",
            storageBucket: "chaostitan41-website.firebasestorage.app",
            messagingSenderId: "553158677453",
            appId: "1:553158677453:web:2cad39890ffdedb98aaa84"
        };

        try {
            firebase.initializeApp(firebaseConfig);
            log('Firebase initialisiert');
        } catch (e) {
            log('Firebase Fehler: ' + e.message);
        }

        const db = firebase.database();
        const videoEl = document.getElementById('overlayVideo');
        const audioEl = document.getElementById('overlayAudio');
        let currentTimeout = null;

        // ── FIX 2: Startzeitpunkt merken – nur NEUE Events verarbeiten ──
        const startTime = Date.now();
        log('Startzeit: ' + startTime);

        function clearTimers() {
            if (currentTimeout) {
                clearTimeout(currentTimeout);
                currentTimeout = null;
            }
        }

        function stopAll() {
            clearTimers();
            try {
                videoEl.pause();
                videoEl.removeAttribute('src');
                videoEl.load();
            } catch {}
            try {
                audioEl.pause();
                audioEl.removeAttribute('src');
                audioEl.load();
            } catch {}
        }

        async function playGiphy(gifId) {
            log('GIF empfangen: ' + gifId);
            stopAll();
            if (!gifId) return;

            try {
                const res = await fetch(`/api/giphy/${gifId}`);
                const data = await res.json();
                if (!data.success) {
                    log('Giphy Fehler: ' + data.error);
                    return;
                }

                videoEl.src = data.videoUrl;
                videoEl.loop = false;
                videoEl.muted = false;
                videoEl.play().catch(e => log('Giphy Play Error: ' + e.message));

                clearTimers();
                currentTimeout = setTimeout(stopAll, 8500);
            } catch (err) {
                log('Giphy Request Error: ' + err.message);
            }
        }

        async function playVlipsyFromEmbedUrl(embedUrl) {
            log('Vlipsy empfangen: ' + embedUrl);
            stopAll();
            if (!embedUrl) return;

            try {
                const clipId = embedUrl.split('/').pop();
                const res = await fetch(`/api/vlipsy/${clipId}`);
                const data = await res.json();

                if (!data.success) {
                    log('Vlipsy Fehler: ' + data.error);
                    return;
                }

                videoEl.src = data.videoUrl;
                videoEl.loop = false;
                videoEl.muted = false;
                videoEl.play().catch(e => log('Vlipsy Play Error: ' + e.message));

                clearTimers();
                currentTimeout = setTimeout(stopAll, 8500);
            } catch (err) {
                log('Vlipsy Request Error: ' + err.message);
            }
        }

        async function playMyInstantsFromUrl(pageUrl) {
            log('MyInstants empfangen: ' + pageUrl);
            stopAll();
            if (!pageUrl) return;

            try {
                const res = await fetch(`/api/myinstants?url=${encodeURIComponent(pageUrl)}`);
                const data = await res.json();

                if (!data.success) {
                    log('MyInstants Fehler: ' + data.error);
                    return;
                }

                audioEl.src = data.audioUrl;
                audioEl.loop = false;
                audioEl.play().catch(e => log('MyInstants Play Error: ' + e.message));

                clearTimers();
                currentTimeout = setTimeout(stopAll, 8500);
            } catch (err) {
                log('MyInstants Request Error: ' + err.message);
            }
        }

        // ── FIX 3: Timestamp-Check – alte Einträge beim Start ignorieren ──
        function isNew(val) {
            if (!val || !val.timestamp) return false;
            const age = Date.now() - val.timestamp;
            // Ignoriere Einträge älter als 10 Sekunden (Puffer für Ladezeit)
            if (age > 10000) {
                log('Alten Eintrag ignoriert (Alter: ' + Math.round(age/1000) + 's)');
                return false;
            }
            return true;
        }

        log('Richte Listener ein...');

        db.ref('.info/connected').on('value', (snap) => {
            log('Firebase verbunden: ' + snap.val());
        });

        // ── FIX 4: limitToLast(1) + Timestamp-Filter kombiniert ──
        db.ref('activeGifs').limitToLast(1).on('child_added', snap => {
            const val = snap.val();
            log('GIF Event: ' + JSON.stringify(val));
            if (isNew(val) && val.gifId) playGiphy(val.gifId);
        });

        db.ref('activeVlipsy').limitToLast(1).on('child_added', snap => {
            const val = snap.val();
            log('Vlipsy Event: ' + JSON.stringify(val));
            if (isNew(val) && val.embedUrl) playVlipsyFromEmbedUrl(val.embedUrl);
        });

        db.ref('activeMyInstants').limitToLast(1).on('child_added', snap => {
            const val = snap.val();
            log('MyInstants Event: ' + JSON.stringify(val));
            if (isNew(val) && val.embedUrl) playMyInstantsFromUrl(val.embedUrl);
        });

        log('Setup abgeschlossen');
    </script>

</body>
</html>
