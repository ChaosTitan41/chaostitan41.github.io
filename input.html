<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF & Meme Gönder | CHAOSTITAN41</title>
    <link rel="icon" type="image/ico" href="image/favicon.ico">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body {
            background: #000 url('bg.png') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            font-family: 'Impact', sans-serif;
            text-align: center;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            border: 1px solid #ff0000;
            backdrop-filter: blur(10px);
        }

        input {
            padding: 15px;
            width: 90%;
            border-radius: 8px;
            border: 1px solid #444;
            background: #000;
            color: #fff;
            margin-bottom: 15px;
            font-size: 1.1rem;
            text-align: center;
            font-family: Arial, sans-serif;
            box-sizing: border-box;
        }

        .giphy-search-btn {
            display: inline-block;
            background: #000;
            color: #fff;
            border: 1px solid #fff;
            padding: 10px 15px;
            border-radius: 5px;
            text-decoration: none;
            margin-bottom: 20px;
            font-family: Arial, sans-serif;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .giphy-search-btn:hover {
            background: #fff;
            color: #000;
        }

        .send-btn {
            background: linear-gradient(180deg, #8B0000 0%, #4a0000 100%);
            color: #fff;
            border: 2px solid #ff0000;
            padding: 20px;
            width: 100%;
            border-radius: 10px;
            font-size: 1.5rem;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Impact';
            transition: 0.3s;
        }

        .send-btn:hover:not(:disabled) {
            background: #ff0000;
            box-shadow: 0 0 20px #ff0000;
        }

        .send-btn:disabled {
            background: #333;
            border-color: #555;
            cursor: not-allowed;
            opacity: 0.5;
        }

        #status {
            margin-top: 20px;
            font-family: Arial;
            font-weight: bold;
            min-height: 24px;
        }

        #preview {
            max-width: 200px;
            display: none;
            margin: 15px auto;
            border: 2px solid red;
            border-radius: 10px;
        }

        .logo-link {
            display: inline-block;
            text-decoration: none;
            cursor: pointer;
        }

        .logo-img {
            max-width: 200px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .logo-link:hover .logo-img {
            transform: scale(1.05);
            filter: drop-shadow(0 0 25px #ff0000);
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-link"><img src="logo.png" class="logo-img" alt="CHAOSTITAN41 Logo"></a><br>
        
        <a href="https://giphy.com" target="_blank" class="giphy-search-btn">GIF ARA</a>
        <a href="https://vlipsy.com" target="_blank" class="giphy-search-btn" style="margin-left:5px;">MEME ARA</a>
        <a href="https://www.myinstants.com" target="_blank" class="giphy-search-btn" style="margin-left:5px;">SES ARA</a>
        
        <input type="text" id="username" placeholder="ADINIZ">
        <input type="text" id="media-url" placeholder="Giphy, Vlipsy oder MyInstants Link hier einfügen..." oninput="validateInput()">
        
        <img id="preview" alt="Vorschau">

        <button onclick="send()" class="send-btn" id="sendBtn" disabled>YAYINA GÖNDER!</button>
        <div id="status"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC4fo69Q0sf7DVgJSDhojAPzLsQ7SDu6cg",
            authDomain: "chaostitan41-website.firebaseapp.com",
            databaseURL: "https://chaostitan41-website-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "chaostitan41-website",
            storageBucket: "chaostitan41-website.firebasestorage.app",
            messagingSenderId: "553158677453",
            appId: "1:553158677453:web:2cad39890ffdedb98aaa84"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const statusDiv = document.getElementById('status');
        const sendBtn = document.getElementById('sendBtn');
        let timerInterval;
        let isCooldownActive = false;

        // ID-Extraktions-Funktionen
        function getGiphyId(url) {
            const match = url.match(/(?:giphy\.com\/(?:gifs|stickers|clips)\/(?:.*-)?|media\.giphy\.com\/media\/(?:v1\.[^\/]+\/)?|giphy\.com\/embed\/)([a-zA-Z0-9]+)/i);
            return match ? match[1] : null;
        }

        function getVlipsyId(url) {
            const match = url.match(/vlipsy\.com\/(?:clip|clips|embed)\/([a-zA-Z0-9_-]+)/i);
            return match ? match[1] : null;
        }

        function getMyInstantsId(url) {
            const match = url.match(/myinstants\.com\/(?:[a-z]{2}\/)?instant\/([a-zA-Z0-9_-]+)/i);
            return match ? match[1] : null;
        }

        // Giphy-Validierung
        async function checkGiphyExists(id) {
            return new Promise(resolve => {
                const img = new Image();
                img.onload = () => resolve(true);
                img.onerror = () => resolve(false);
                img.src = `https://media.giphy.com/media/${id}/giphy.gif`;
            });
        }

        // Input-Validierung und Vorschau
        async function validateInput() {
            const url = document.getElementById('media-url').value.trim();
            const preview = document.getElementById('preview');
            
            sendBtn.disabled = true;
            preview.style.display = 'none';

            if (!url) return;

            // Giphy-Check (mit Vorschau)
            const giphyId = getGiphyId(url);
            if (giphyId) {
                const exists = await checkGiphyExists(giphyId);
                if (exists) {
                    preview.src = `https://media.giphy.com/media/${giphyId}/giphy.gif`;
                    preview.style.display = 'block';
                    if (!isCooldownActive) sendBtn.disabled = false;
                }
                return;
            }

            // Vlipsy-Check
            const vlipsyId = getVlipsyId(url);
            if (vlipsyId) {
                if (!isCooldownActive) sendBtn.disabled = false;
                return;
            }

            // MyInstants-Check
            const myInstantsId = getMyInstantsId(url);
            if (myInstantsId) {
                if (!isCooldownActive) sendBtn.disabled = false;
                return;
            }
        }

        // Cooldown-System
        function checkCooldown() {
            db.ref('lastMediaTime').once('value', snap => {
                const lastTime = snap.val() || 0;
                const diff = (Date.now() - lastTime) / 1000;
                clearInterval(timerInterval);

                if (diff < 30) {
                    isCooldownActive = true;
                    let timeLeft = Math.ceil(30 - diff);
                    timerInterval = setInterval(() => {
                        timeLeft--;
                        if (timeLeft <= 0) {
                            clearInterval(timerInterval);
                            isCooldownActive = false;
                            statusDiv.innerHTML = "";
                            validateInput();
                        } else {
                            statusDiv.innerHTML = `<span style="color:#ffaa00">COOLDOWN: ${timeLeft}s bekleyin...</span>`;
                        }
                    }, 1000);
                } else {
                    isCooldownActive = false;
                }
            });
        }

        // User-IP abrufen
        async function getUserIP() {
            try {
                const res = await fetch('https://api64.ipify.org?format=json');
                const data = await res.json();
                return data.ip.replace(/\./g, '_');
            } catch(e) { return "unknown"; }
        }

        // Haupt-Sende-Funktion
        async function send() {
            const username = document.getElementById('username').value.trim() || "Anonim";
            const url = document.getElementById('media-url').value.trim();

            const giphyId = getGiphyId(url);
            const vlipsyId = getVlipsyId(url);
            const myInstantsId = getMyInstantsId(url);

            let mediaData = null;
            let targetPath = "";

            if (giphyId) {
                // Giphy-Handling (unverändert)
                const exists = await checkGiphyExists(giphyId);
                if (!exists) { alert("GIF nicht gefunden!"); return; }
                mediaData = { gifId: giphyId, userName: username };
                targetPath = 'activeGifs';
            } else if (vlipsyId) {
                // Vlipsy-Handling (mit Timing-Kontrolle)
                mediaData = {
                    embedUrl: `https://vlipsy.com/embed/${vlipsyId}`,
                    clipName: username + " - Vlipsy",
                    userName: username,
                    maxDuration: 8.5,
                    loop: false,
                    autoStop: true
                };
                targetPath = 'activeVlipsy';
            } else if (myInstantsId) {
                // MyInstants-Handling (gleiche Struktur wie Vlipsy)
                mediaData = {
                    embedUrl: `https://www.myinstants.com/instant/${myInstantsId}/`,
                    clipName: username + " - MyInstants",
                    userName: username
                };
                targetPath = 'activeVlipsy'; // Gleicher Firebase-Pfad wie Vlipsy
            } else {
                alert("Ungültiger Link!");
                return;
            }

            const userIP = await getUserIP();
            
            // Ban-Check und Senden
            db.ref('bannedIPs/' + userIP).once('value', snap => {
                if (snap.exists()) {
                    statusDiv.innerHTML = "<span style='color:red'>BANLISINIZ!</span>";
                    db.ref('bannedRequests').push({ userName: username, userIP: userIP, timestamp: firebase.database.ServerValue.TIMESTAMP });
                    return;
                }
                
                const now = Date.now();
                db.ref('lastMediaTime').set(now);
                
                const entry = { ...mediaData, userIP: userIP, timestamp: now };
                
                db.ref(targetPath).push(entry).then(() => {
                    statusDiv.innerHTML = "<span style='color:#00ff99'>✅ GÖNDERİLDİ!</span>";
                    document.getElementById('media-url').value = "";
                    document.getElementById('preview').style.display = 'none';
                    sendBtn.disabled = true;
                    
                    const day = new Date().toISOString().split('T')[0];
                    db.ref('stats/daily/' + day + '/' + userIP).set(true);
                });
            });
        }

        // Initialisierung
        checkCooldown();
        db.ref('lastMediaTime').on('value', () => checkCooldown());
    </script>
</body>
</html>
